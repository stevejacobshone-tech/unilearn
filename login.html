<head>

<style>
:root{
  --seafoam:#6ED3C7;
  --seafoam-deep:#2fb7aa;
  --seafoam-light:#e4f9f7;
  --seafoam-mid:#a8e8e3;
  --dark:#0a1628;
  --slate:#475569;
  --soft:#f2fbfa;
  --radius:22px;
  --radius-sm:12px;
  --error:#ef4444;
}

*{ box-sizing:border-box; margin:0; padding:0; }
body{
  font-family:'DM Sans',sans-serif;
  background:linear-gradient(170deg, white 0%, var(--soft) 55%, #c8f0ec 100%);
  color:var(--dark);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.blob{
  position:fixed; border-radius:50%; pointer-events:none;
}
.blob-1{
  width:600px; height:600px;
  background:radial-gradient(circle, rgba(110,211,199,.18) 0%, transparent 70%);
  top:-150px; right:-150px;
  animation:floatA 12s ease-in-out infinite;
}
.blob-2{
  width:400px; height:400px;
  background:radial-gradient(circle, rgba(47,183,170,.12) 0%, transparent 70%);
  bottom:-100px; left:-100px;
  animation:floatB 15s ease-in-out infinite;
}
@keyframes floatA{
  0%,100%{ transform:translateY(0) scale(1); }
  50%{ transform:translateY(-30px) scale(1.04); }
}
@keyframes floatB{
  0%,100%{ transform:translateY(0) rotate(0deg); }
  50%{ transform:translateY(-20px) rotate(3deg); }
}

.login-card{
  background:white;
  border-radius:var(--radius);
  box-shadow:0 30px 80px rgba(47,183,170,.15), 0 0 0 1px rgba(110,211,199,.2);
  width:100%;
  max-width:440px;
  padding:48px;
  position:relative;
  z-index:1;
  animation: cardIn .5s cubic-bezier(.34,1.2,.64,1) both;
}
@keyframes cardIn{
  from{ opacity:0; transform:translateY(20px) scale(.97); }
  to{ opacity:1; transform:translateY(0) scale(1); }
}

.logo-wrap{
  text-align:center;
  margin-bottom:32px;
}
.logo{
  font-family:'Sora',sans-serif;
  font-size:28px;
  font-weight:800;
  color:var(--seafoam-deep);
  text-decoration:none;
  letter-spacing:-1px;
}
.logo-sub{
  font-size:13px;
  color:var(--slate);
  margin-top:4px;
}

h1{
  font-family:'Sora',sans-serif;
  font-size:24px;
  font-weight:800;
  text-align:center;
  margin-bottom:8px;
  letter-spacing:-0.5px;
}
.subtitle{
  text-align:center;
  font-size:14px;
  color:var(--slate);
  margin-bottom:32px;
}

.field{ margin-bottom:20px; }
.field label{
  display:block;
  font-size:13px;
  font-weight:600;
  color:var(--dark);
  margin-bottom:6px;
}
.field input{
  width:100%;
  padding:13px 16px;
  border:1.5px solid #e2eeec;
  border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;
  font-size:15px;
  color:var(--dark);
  background:white;
  transition:.2s;
  outline:none;
}
.field input:focus{
  border-color:var(--seafoam-deep);
  box-shadow:0 0 0 3px rgba(47,183,170,.1);
}
.field.has-error input{
  border-color:var(--error);
  box-shadow:0 0 0 3px rgba(239,68,68,.08);
}
.field .err-msg{
  font-size:12px;
  color:var(--error);
  margin-top:6px;
  display:none;
}
.field.has-error .err-msg{ display:block; }

.pw-wrap{ position:relative; }
.pw-wrap input{ padding-right:44px; }
.pw-toggle{
  position:absolute;
  right:12px;
  top:50%;
  transform:translateY(-50%);
  background:none;
  border:none;
  cursor:pointer;
  color:#94a3b8;
  padding:4px;
  transition:.2s;
  display:flex;
  align-items:center;
}
.pw-toggle:hover{ color:var(--seafoam-deep); }

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:24px;
  font-size:13px;
}
.remember{
  display:flex;
  align-items:center;
  gap:8px;
  cursor:pointer;
  color:var(--slate);
}
.remember input{
  width:16px;
  height:16px;
  accent-color:var(--seafoam-deep);
  cursor:pointer;
}
.forgot{
  color:var(--seafoam-deep);
  text-decoration:none;
  font-weight:600;
}
.forgot:hover{ text-decoration:underline; }

.btn-submit{
  width:100%;
  padding:14px 22px;
  border-radius:var(--radius-sm);
  background:var(--seafoam-deep);
  color:white;
  font-family:'Sora',sans-serif;
  font-size:15px;
  font-weight:700;
  border:none;
  cursor:pointer;
  transition:.22s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
}
.btn-submit:hover{
  background:#27a396;
  transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(47,183,170,.3);
}
.btn-submit:disabled{
  opacity:.7;
  cursor:not-allowed;
  transform:none !important;
  box-shadow:none !important;
}
.spinner{
  width:18px;
  height:18px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:white;
  border-radius:50%;
  animation:spin .7s linear infinite;
  display:none;
}
@keyframes spin{ to{transform:rotate(360deg)} }
.btn-submit.loading .btn-label{ display:none; }
.btn-submit.loading .spinner{ display:block; }

/* Error / info message box */
.msg-box{
  border-radius:10px;
  padding:12px 16px;
  margin-bottom:20px;
  font-size:13px;
  display:none;
  line-height:1.5;
}
.msg-box.show{ display:block; }
.msg-box.error{
  background:#fef2f2;
  border:1px solid #fecaca;
  color:var(--error);
}
.msg-box.info{
  background:var(--seafoam-light);
  border:1px solid var(--seafoam-mid);
  color:#0f766e;
}

.card-footer{
  text-align:center;
  margin-top:28px;
  padding-top:24px;
  border-top:1px solid #e8f5f3;
  font-size:14px;
  color:var(--slate);
}
.card-footer a{
  color:var(--seafoam-deep);
  text-decoration:none;
  font-weight:600;
}
.card-footer a:hover{ text-decoration:underline; }

/* Forgot-password reset state */
.reset-mode .normal-only{ display:none; }
.reset-mode .reset-only{ display:block !important; }
.reset-only{ display:none; }

@media(max-width:480px){
  .login-card{ padding:32px 24px; }
  h1{ font-size:22px; }
}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="login-card" id="login-card">
  <div class="logo-wrap">
    <a href="index.html" class="logo">UniLearn</a>
    <div class="logo-sub" id="logo-sub">Welcome back</div>
  </div>

  <h1 id="card-heading">Log in to your account</h1>
  <p class="subtitle" id="card-subtitle">Enter your email and password to continue</p>

  <!-- message box (error or info) -->
  <div class="msg-box" id="msg-box"></div>

  <form id="login-form" onsubmit="handleLogin(event)">

    <!-- Email -->
    <div class="field" id="f-email">
      <label for="email">Email address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="you@school.edu"
        autocomplete="email"
        required
      >
      <div class="err-msg">Please enter a valid email address.</div>
    </div>

    <!-- Password (hidden in reset mode) -->
    <div class="field normal-only" id="f-password">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        >
        <button type="button" class="pw-toggle" onclick="togglePassword()" aria-label="Toggle password visibility">
          <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="err-msg">Please enter your password.</div>
    </div>

    <!-- Options row -->
    <div class="options normal-only">
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        <span>Remember me</span>
      </label>
      <a href="#" class="forgot" onclick="enterResetMode(event)">Forgot password?</a>
    </div>

    <!-- Submit -->
    <button type="submit" class="btn-submit" id="submit-btn">
      <span class="btn-label" id="btn-label-text">Log In</span>
      <div class="spinner"></div>
    </button>

    <!-- Back to login (reset mode only) -->
    <button type="button" class="reset-only" onclick="exitResetMode()" style="width:100%;margin-top:12px;padding:11px;border:1.5px solid #e2eeec;border-radius:var(--radius-sm);background:white;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;color:var(--slate);cursor:pointer;transition:.2s;">
      ← Back to login
    </button>

  </form>

  <div class="card-footer">
    Don't have an account? <a href="signup.html">Sign up</a>
  </div>
</div>

<script>
// ── Helpers ──
function getDashboardUrl() {
  return '/dashboard/school/unilearn_dashboard.html';
}

function showMsg(type, message) {
  const el = document.getElementById('msg-box');
  el.textContent = message;
  el.className = 'msg-box show ' + type;
}

function hideMsg() {
  const el = document.getElementById('msg-box');
  el.className = 'msg-box';
}

// ── Check session on load ──
if (window._db) {
  window._db.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = getDashboardUrl();
  }).catch(() => {});

  window._db.auth.onAuthStateChange((event, session) => {
    if (event === 'SIGNED_IN' && session) {
      window.location.href = getDashboardUrl();
    }
  });
}

// ── Password toggle ──
function togglePassword() {
  const input = document.getElementById('password');
  const icon  = document.getElementById('eye-icon');

  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = `
      <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
      <line x1="1" y1="1" x2="23" y2="23"/>
    `;
  } else {
    input.type = 'password';
    icon.innerHTML = `
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    `;
  }
}

// ── Clear errors on input ──
document.querySelectorAll('input').forEach(input => {
  input.addEventListener('input', () => {
    input.closest('.field')?.classList.remove('has-error');
    hideMsg();
  });
});

// ── Forgot-password UI ──
let inResetMode = false;

function enterResetMode(e) {
  e.preventDefault();
  inResetMode = true;
  document.getElementById('login-card').classList.add('reset-mode');
  document.getElementById('card-heading').textContent = 'Reset your password';
  document.getElementById('card-subtitle').textContent = "Enter your email and we'll send you a reset link.";
  document.getElementById('logo-sub').textContent = 'Password recovery';
  document.getElementById('btn-label-text').textContent = 'Send Reset Link';
  hideMsg();
}

function exitResetMode() {
  inResetMode = false;
  document.getElementById('login-card').classList.remove('reset-mode');
  document.getElementById('card-heading').textContent = 'Log in to your account';
  document.getElementById('card-subtitle').textContent = 'Enter your email and password to continue';
  document.getElementById('logo-sub').textContent = 'Welcome back';
  document.getElementById('btn-label-text').textContent = 'Log In';
  hideMsg();
}

// ── Login ──
async function handleLogin(e) {
  e.preventDefault();
  hideMsg();

  if (!window._db) {
    showMsg('error', 'Authentication service unavailable. Please refresh the page.');
    return;
  }

  const email    = document.getElementById('email').value.trim();
  const btn      = document.getElementById('submit-btn');

  // Validate email
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    document.getElementById('f-email').classList.add('has-error');
    return;
  }

  // ── Reset password mode ──
  if (inResetMode) {
    btn.classList.add('loading'); btn.disabled = true;

    try {
      const { error } = await window._db.auth.resetPasswordForEmail(email, {
        // 🔧 DOMAIN NOTE: Right now this uses your current deployment origin.
        // When you buy your domain, replace window.location.origin with
        // 'https://yourdomain.com' — and add that domain to Supabase →
        // Authentication → URL Configuration → Redirect URLs.
        redirectTo: window.location.origin + '/main/unilearn_login.html'
      });

      if (error) throw error;

      showMsg('info', `✓ Reset link sent to ${email}. Check your inbox (and spam folder).`);
    } catch (err) {
      console.error('Reset error:', err);
      showMsg('error', 'Failed to send reset email. Please try again.');
    } finally {
      btn.classList.remove('loading'); btn.disabled = false;
    }
    return;
  }

  // ── Regular login ──
  const password = document.getElementById('password').value;
  let hasError = false;

  if (!password) {
    document.getElementById('f-password').classList.add('has-error');
    hasError = true;
  }
  if (hasError) return;

  const remember = document.getElementById('remember').checked;

  btn.classList.add('loading'); btn.disabled = true;

  try {
    const { data, error } = await window._db.auth.signInWithPassword({ email, password });

    if (error) throw error;

    if (remember) {
      localStorage.setItem('unilearn_remember_email', email);
    } else {
      localStorage.removeItem('unilearn_remember_email');
    }

    // onAuthStateChange handles redirect

  } catch (err) {
    console.error('Login error:', err);

    let msg = 'Invalid email or password. Please try again.';
    const m = (err.message || '').toLowerCase();
    if (m.includes('email not confirmed'))          msg = 'Please confirm your email address before logging in. Check your inbox.';
    else if (m.includes('rate limit') || m.includes('too many')) msg = 'Too many attempts. Please wait a moment and try again.';
    else if (m.includes('network') || m.includes('fetch'))       msg = 'Network error. Check your connection and try again.';

    showMsg('error', msg);
    btn.classList.remove('loading'); btn.disabled = false;
  }
}

// ── Pre-fill remembered email ──
(function() {
  const saved = localStorage.getItem('unilearn_remember_email');
  if (saved) {
    document.getElementById('email').value = saved;
    document.getElementById('remember').checked = true;
  }
})();
</script>
</body>
</html>
