<style>
:root{
  --ink:#09090a;
  --ink2:#111113;
  --ink3:#161618;
  --acc:#00e87a;
  --acc2:#00c4ff;
  --muted:rgba(255,255,255,.38);
  --mid:rgba(255,255,255,.6);
  --border:rgba(255,255,255,.08);
  --border-focus:rgba(0,232,122,.4);
  --ease:cubic-bezier(.22,1,.36,1);
  --err:#f87171;
  --err-bg:rgba(248,113,113,.07);
  --info-bg:rgba(0,232,122,.06);
  --info-border:rgba(0,232,122,.2);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--ink);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  position:relative;
  overflow-x:hidden;
}

/* ── CURSOR (desktop only) ── */
#cd,#cr{position:fixed;pointer-events:none;z-index:9999;border-radius:50%;top:0;left:0}
#cd{width:6px;height:6px;background:#fff;transform:translate(-50%,-50%)}
#cr{width:36px;height:36px;border:1px solid rgba(255,255,255,.3);transform:translate(-50%,-50%);transition:width .35s var(--ease),height .35s var(--ease),border-color .3s,background .3s;mix-blend-mode:difference}
#cr.g{width:52px;height:52px;border-color:var(--acc);background:rgba(0,232,122,.06)}
#cr.s{width:18px;height:18px;background:rgba(255,255,255,.1)}
@media(pointer:coarse){#cd,#cr{display:none}body{cursor:auto}}

/* ── CANVAS ── */
#cv{position:fixed;inset:0;width:100%;height:100%;opacity:.35;pointer-events:none;z-index:0}

/* ── AMBIENT GLOWS ── */
.glow-tl{position:fixed;top:-120px;left:-120px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(0,232,122,.055) 0%,transparent 65%);filter:blur(60px);pointer-events:none;animation:breathe 10s ease-in-out infinite alternate}
.glow-br{position:fixed;bottom:-120px;right:-80px;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(0,196,255,.04) 0%,transparent 70%);filter:blur(60px);pointer-events:none;animation:breathe 13s ease-in-out infinite alternate-reverse}
@keyframes breathe{0%{transform:scale(1)}100%{transform:scale(1.1)}}

/* ── CARD ── */
.card{
  width:100%;
  max-width:420px;
  background:var(--ink2);
  border:1px solid var(--border);
  border-radius:24px;
  padding:44px 40px;
  position:relative;
  z-index:1;
  animation:cardIn .45s var(--ease) both;
  box-shadow:0 40px 80px rgba(0,0,0,.5),0 0 0 1px rgba(0,232,122,.06);
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(18px) scale(.97)}
  to{opacity:1;transform:none}
}

/* subtle inner glow at top */
.card::before{
  content:'';
  position:absolute;
  top:0;left:50%;
  transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(0,232,122,.3),transparent);
  border-radius:0 0 50% 50%;
}

/* ── LOGO ── */
.logo-wrap{text-align:center;margin-bottom:32px}
.logo{
  display:inline-flex;align-items:center;gap:9px;
  text-decoration:none;
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:700;
  letter-spacing:-.4px;color:#fff;
}
.logo-g{
  width:28px;height:28px;border-radius:8px;
  background:var(--acc);display:grid;place-items:center;flex-shrink:0;
}
.logo-g svg{width:14px;height:14px;fill:#000}
.logo-sub{font-size:12px;color:var(--muted);margin-top:5px;font-weight:300}

/* ── HEADING ── */
.card-head{
  font-family:'Playfair Display',serif;
  font-size:22px;font-weight:900;
  letter-spacing:-.03em;line-height:1;
  margin-bottom:5px;text-align:center;
}
.card-head em{
  font-style:italic;
  background:linear-gradient(110deg,var(--acc) 20%,var(--acc2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.card-sub{font-size:13px;color:var(--muted);text-align:center;font-weight:300;line-height:1.55;margin-bottom:28px}

/* ── DIVIDER ── */
.divider{height:1px;background:var(--border);margin:24px 0}

/* ── FIELDS ── */
.field{margin-bottom:14px}
.field label{
  display:block;font-size:12px;font-weight:500;
  color:rgba(255,255,255,.5);margin-bottom:6px;letter-spacing:.2px;
}
.field input{
  width:100%;padding:11px 14px;
  border:1px solid rgba(255,255,255,.09);
  border-radius:11px;
  font-family:'DM Sans',sans-serif;font-size:14px;color:#fff;
  background:rgba(255,255,255,.04);
  transition:border-color .25s,box-shadow .25s,background .25s;
  outline:none;-webkit-appearance:none;
}
@media(max-width:540px){
  .field input{font-size:16px} /* prevent iOS zoom */
}
.field input::placeholder{color:rgba(255,255,255,.2)}
.field input:focus{
  border-color:var(--border-focus);
  background:rgba(0,232,122,.03);
  box-shadow:0 0 0 3px rgba(0,232,122,.08);
}
.field.has-error input{
  border-color:var(--err);
  box-shadow:0 0 0 3px var(--err-bg);
}
.field .err-msg{font-size:11px;color:var(--err);margin-top:5px;display:none}
.field.has-error .err-msg{display:block}

/* ── PASSWORD ── */
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-toggle{
  position:absolute;right:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.25);display:flex;align-items:center;
  padding:4px;transition:color .2s;
  -webkit-tap-highlight-color:transparent;
}
.pw-toggle:hover{color:var(--acc)}
.pw-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── OPTIONS ROW ── */
.options{
  display:flex;justify-content:space-between;align-items:center;
  flex-wrap:wrap;gap:8px 12px;
  margin-bottom:20px;font-size:12px;
}
.remember{display:flex;align-items:center;gap:7px;cursor:pointer;color:var(--muted)}
.remember input{width:15px;height:15px;accent-color:var(--acc);flex-shrink:0}
.forgot{color:var(--acc);text-decoration:none;font-weight:500;transition:.2s;margin-left:auto}
.forgot:hover{opacity:.75}

/* ── SUBMIT BUTTON ── */
.btn-submit{
  width:100%;padding:13px 22px;border-radius:100px;
  background:var(--acc);color:#000;
  font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background .25s,transform .2s var(--ease),box-shadow .3s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  min-height:48px;
}
.btn-submit:hover{background:#00ffaa;transform:translateY(-2px);box-shadow:0 12px 32px rgba(0,232,122,.3)}
.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.6;pointer-events:none}
.spinner{width:16px;height:16px;border:2px solid rgba(0,0,0,.2);border-top-color:#000;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.btn-submit.loading .btn-label{display:none}
.btn-submit.loading .spinner{display:block}

/* ── BACK BUTTON (reset mode) ── */
.btn-back{
  width:100%;margin-top:10px;padding:11px 22px;
  border:1px solid var(--border);border-radius:100px;
  background:transparent;color:var(--muted);
  font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;
  cursor:pointer;transition:.25s;display:none;
  -webkit-tap-highlight-color:transparent;
  min-height:44px;
}
.btn-back:hover{border-color:rgba(255,255,255,.2);color:#fff}
.reset-mode .btn-back{display:flex;align-items:center;justify-content:center;gap:6px}

/* ── MESSAGE BOX ── */
.msg-box{
  border-radius:10px;padding:11px 14px;
  margin-bottom:16px;font-size:12px;line-height:1.55;display:none;
}
.msg-box.show{display:block}
.msg-box.error{background:var(--err-bg);border:1px solid rgba(248,113,113,.2);color:var(--err)}
.msg-box.info{background:var(--info-bg);border:1px solid var(--info-border);color:rgba(0,232,122,.9)}

/* ── RESET MODE ── */
.reset-mode .normal-only{display:none}
.reset-mode .reset-only{display:block !important}
.reset-only{display:none}

/* ── FOOTER ── */
.card-footer{
  text-align:center;margin-top:24px;padding-top:20px;
  border-top:1px solid var(--border);
  font-size:13px;color:var(--muted);font-weight:300;
}
.card-footer a{color:var(--acc);text-decoration:none;font-weight:500}
.card-footer a:hover{opacity:.75}

/* ── EPILL ── */
.epill{
  display:inline-flex;align-items:center;gap:7px;
  padding:5px 13px;border-radius:100px;
  background:rgba(0,232,122,.07);border:1px solid rgba(0,232,122,.15);
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:var(--acc);font-weight:500;margin-bottom:20px;
}
.pulse{width:5px;height:5px;border-radius:50%;background:var(--acc);animation:blink 2s infinite;box-shadow:0 0 6px var(--acc);flex-shrink:0}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ── MOBILE ── */
@media(max-width:480px){
  .card{padding:32px 20px;border-radius:20px}
  .card-head{font-size:20px}
}
@media(max-width:360px){
  .card{padding:24px 16px}
}
</style>
</head>
<body>

<div id="cd"></div>
<div id="cr"></div>
<canvas id="cv"></canvas>
<div class="glow-tl"></div>
<div class="glow-br"></div>

<div class="card" id="login-card">

  <!-- Logo -->
  <div class="logo-wrap">
    <a class="logo" href="index.html">
      <div class="logo-g"><svg viewBox="0 0 14 14"><path d="M7 1L1 4v6l6 3 6-3V4z"/></svg></div>
      UniLearn
    </a>
    <div class="logo-sub" id="logo-sub">School administration portal</div>
  </div>

  <!-- Pill -->
  <div style="text-align:center">
    <div class="epill" id="card-pill"><span class="pulse"></span><span id="pill-text">Secure login</span></div>
  </div>

  <!-- Heading -->
  <div class="card-head" id="card-heading">Welcome <em>back.</em></div>
  <p class="card-sub" id="card-subtitle">Enter your credentials to access your campus</p>

  <!-- Message box -->
  <div class="msg-box" id="msg-box"></div>

  <form id="login-form" onsubmit="handleLogin(event)">

    <!-- Email -->
    <div class="field" id="f-email">
      <label for="email">Email address</label>
      <input type="email" id="email" name="email" placeholder="you@school.edu" autocomplete="email" required>
      <div class="err-msg">Please enter a valid email address.</div>
    </div>

    <!-- Password -->
    <div class="field normal-only" id="f-password">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
        <button type="button" class="pw-toggle" onclick="togglePassword()" aria-label="Toggle password">
          <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="err-msg">Please enter your password.</div>
    </div>

    <!-- Options -->
    <div class="options normal-only">
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        <span>Remember me</span>
      </label>
      <a href="#" class="forgot" onclick="enterResetMode(event)">Forgot password?</a>
    </div>

    <!-- Message box -->
    <div class="msg-box" id="msg-box"></div>

    <!-- Submit -->
    <button type="submit" class="btn-submit" id="submit-btn">
      <span class="btn-label" id="btn-label-text">Log In</span>
      <div class="spinner"></div>
    </button>

    <!-- Back (reset mode) -->
    <button type="button" class="btn-back" onclick="exitResetMode()">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to login
    </button>

  </form>

  <div class="card-footer">
    No account yet? <a href="signup.html">Start your free trial</a>
  </div>
</div>

<script>
/* ── CURSOR (desktop only) ── */
const isTouch='ontouchstart'in window||navigator.maxTouchPoints>0;
if(!isTouch){
  const cd=document.getElementById('cd'),cr=document.getElementById('cr');
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cd.style.left=mx+'px';cd.style.top=my+'px'});
  (function raf(){rx+=(mx-rx)*.11;ry+=(my-ry)*.11;cr.style.left=rx+'px';cr.style.top=ry+'px';requestAnimationFrame(raf)})();
  document.querySelectorAll('a,button,.card').forEach(el=>{
    el.addEventListener('mouseenter',()=>cr.classList.add('g'));
    el.addEventListener('mouseleave',()=>cr.classList.remove('g'));
  });
  document.addEventListener('mousedown',()=>{cr.classList.remove('g');cr.classList.add('s')});
  document.addEventListener('mouseup',()=>cr.classList.remove('s'));
  document.body.style.cursor='none';
}

/* ── PARTICLE CANVAS ── */
(function(){
  const canvas=document.getElementById('cv'),ctx=canvas.getContext('2d');
  let W,H,pts=[];
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  const count=window.innerWidth<600?20:45;
  for(let i=0;i<count;i++)pts.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.13,vy:(Math.random()-.5)*.13,o:Math.random()*.28+.05});
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<110){ctx.beginPath();ctx.strokeStyle=`rgba(0,232,122,${(1-d/110)*.055})`;ctx.lineWidth=.5;ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.stroke()}
    }
    pts.forEach(p=>{
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(0,232,122,${p.o})`;ctx.fill();
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ── HELPERS ── */
function getDashboardUrl(){return'/dashboard.html'}

const msgBoxes=document.querySelectorAll('#msg-box');
function showMsg(type,message){
  msgBoxes.forEach(el=>{el.textContent=message;el.className='msg-box show '+type});
}
function hideMsg(){msgBoxes.forEach(el=>{el.className='msg-box'})}

/* ── CHECK SESSION ── */
if(window._db){
  window._db.auth.getSession().then(({data:{session}})=>{
    if(session)window.location.href=getDashboardUrl();
  }).catch(()=>{});
  window._db.auth.onAuthStateChange((event,session)=>{
    if(event==='SIGNED_IN'&&session)window.location.href=getDashboardUrl();
  });
}

/* ── PASSWORD TOGGLE ── */
function togglePassword(){
  const input=document.getElementById('password');
  const icon=document.getElementById('eye-icon');
  if(input.type==='password'){
    input.type='text';
    icon.innerHTML=`<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  }else{
    input.type='password';
    icon.innerHTML=`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}

/* ── CLEAR ERRORS ── */
document.querySelectorAll('input').forEach(input=>{
  input.addEventListener('input',()=>{
    input.closest('.field')?.classList.remove('has-error');
    hideMsg();
  });
});

/* ── RESET MODE ── */
let inResetMode=false;
function enterResetMode(e){
  e.preventDefault();
  inResetMode=true;
  document.getElementById('login-card').classList.add('reset-mode');
  document.getElementById('card-heading').innerHTML='Reset your <em>password.</em>';
  document.getElementById('card-subtitle').textContent="Enter your email and we'll send you a reset link.";
  document.getElementById('logo-sub').textContent='Password recovery';
  document.getElementById('pill-text').textContent='Password reset';
  document.getElementById('btn-label-text').textContent='Send Reset Link';
  hideMsg();
}
function exitResetMode(){
  inResetMode=false;
  document.getElementById('login-card').classList.remove('reset-mode');
  document.getElementById('card-heading').innerHTML='Welcome <em>back.</em>';
  document.getElementById('card-subtitle').textContent='Enter your credentials to access your campus';
  document.getElementById('logo-sub').textContent='School administration portal';
  document.getElementById('pill-text').textContent='Secure login';
  document.getElementById('btn-label-text').textContent='Log In';
  hideMsg();
}

/* ── LOGIN ── */
async function handleLogin(e){
  e.preventDefault();
  hideMsg();
  if(!window._db){showMsg('error','Authentication service unavailable. Please refresh.');return;}
  const email=document.getElementById('email').value.trim();
  const btn=document.getElementById('submit-btn');
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    document.getElementById('f-email').classList.add('has-error');return;
  }

  /* Reset password mode */
  if(inResetMode){
    btn.classList.add('loading');btn.disabled=true;
    try{
      const{error}=await window._db.auth.resetPasswordForEmail(email,{
        redirectTo:window.location.origin+'/login.html'
      });
      if(error)throw error;
      showMsg('info',`✓ Reset link sent to ${email}. Check your inbox (and spam folder).`);
    }catch(err){
      showMsg('error','Failed to send reset email. Please try again.');
    }finally{
      btn.classList.remove('loading');btn.disabled=false;
    }
    return;
  }

  /* Regular login */
  const password=document.getElementById('password').value;
  if(!password){document.getElementById('f-password').classList.add('has-error');return;}
  const remember=document.getElementById('remember').checked;
  btn.classList.add('loading');btn.disabled=true;
  try{
    const{data,error}=await window._db.auth.signInWithPassword({email,password});
    if(error)throw error;
    if(remember)localStorage.setItem('unilearn_remember_email',email);
    else localStorage.removeItem('unilearn_remember_email');
  }catch(err){
    let msg='Invalid email or password. Please try again.';
    const m=(err.message||'').toLowerCase();
    if(m.includes('email not confirmed'))msg='Please confirm your email before logging in. Check your inbox.';
    else if(m.includes('rate limit')||m.includes('too many'))msg='Too many attempts. Please wait a moment and try again.';
    else if(m.includes('network')||m.includes('fetch'))msg='Network error. Check your connection and try again.';
    showMsg('error',msg);
    btn.classList.remove('loading');btn.disabled=false;
  }
}

/* ── PRE-FILL REMEMBERED EMAIL ── */
(function(){
  const saved=localStorage.getItem('unilearn_remember_email');
  if(saved){document.getElementById('email').value=saved;document.getElementById('remember').checked=true;}
})();
</script>
</body>
